<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Processing Pipeline Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .processing-queue {
            grid-column: 1 / -1;
        }

        .queue-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #28a745;
            transition: all 0.3s ease;
        }

        .queue-item.processing {
            border-left-color: #ffc107;
            background: #fff3cd;
        }

        .queue-item.completed {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .queue-item.failed {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .file-details {
            font-size: 0.9rem;
            color: #666;
        }

        .progress-container {
            width: 200px;
            margin: 0 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-processing {
            background: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 1000;
        }

        .connected {
            background: #d4edda;
            color: #155724;
        }

        .disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .queue-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .progress-container {
                width: 100%;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connectionStatus">
        <i class="fas fa-circle"></i> Connecting...
    </div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-video"></i> Video Processing Pipeline</h1>
            <p>Real-time monitoring and management dashboard</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="refreshStats()">
                <i class="fas fa-sync-alt"></i> Refresh Stats
            </button>
            <button class="btn btn-secondary" onclick="clearCompleted()">
                <i class="fas fa-trash"></i> Clear Completed
            </button>
        </div>

        <div class="dashboard">
            <div class="card">
                <h2><i class="fas fa-chart-bar"></i> Processing Statistics</h2>
                <div class="stats-grid" id="statsGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading statistics...
                    </div>
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-clock"></i> Recent Activity</h2>
                <div id="recentActivity">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading recent activity...
                    </div>
                </div>
            </div>

            <div class="card processing-queue">
                <h2><i class="fas fa-list"></i> Processing Queue</h2>
                <div id="processingQueue">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading processing queue...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;

        // Initialize WebSocket connection
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('WebSocket connected');
                updateConnectionStatus(true);
                reconnectAttempts = 0;
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (error) {
                    console.error('Error parsing WebSocket message:', error);
                }
            };

            ws.onclose = function() {
                console.log('WebSocket disconnected');
                updateConnectionStatus(false);
                
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(initWebSocket, 2000 * reconnectAttempts);
                }
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }

        function updateConnectionStatus(connected) {
            const statusElement = document.getElementById('connectionStatus');
            if (connected) {
                statusElement.className = 'connection-status connected';
                statusElement.innerHTML = '<i class="fas fa-circle"></i> Connected';
            } else {
                statusElement.className = 'connection-status disconnected';
                statusElement.innerHTML = '<i class="fas fa-circle"></i> Disconnected';
            }
        }

        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'processing_started':
                    addToQueue(data.data);
                    break;
                case 'status_update':
                    updateQueueItem(data.data);
                    break;
                case 'processing_completed':
                    completeQueueItem(data.data);
                    break;
                case 'processing_failed':
                    failQueueItem(data.data);
                    break;
                default:
                    console.log('Unknown message type:', data.type);
            }
        }

        function addToQueue(fileData) {
            const queue = document.getElementById('processingQueue');
            const queueItem = createQueueItem(fileData);
            queue.appendChild(queueItem);
        }

        function createQueueItem(fileData) {
            const item = document.createElement('div');
            item.className = 'queue-item processing';
            item.id = `queue-${fileData.fileId}`;
            
            item.innerHTML = `
                <div class="file-info">
                    <div class="file-name">${fileData.fileName}</div>
                    <div class="file-details">File ID: ${fileData.fileId}</div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="status-badge status-processing">Processing</div>
            `;
            
            return item;
        }

        function updateQueueItem(data) {
            const item = document.getElementById(`queue-${data.fileId}`);
            if (item) {
                const progressFill = item.querySelector('.progress-fill');
                const statusBadge = item.querySelector('.status-badge');
                
                progressFill.style.width = `${data.progress}%`;
                statusBadge.textContent = data.status;
            }
        }

        function completeQueueItem(data) {
            const item = document.getElementById(`queue-${data.fileId}`);
            if (item) {
                item.className = 'queue-item completed';
                const statusBadge = item.querySelector('.status-badge');
                statusBadge.className = 'status-badge status-completed';
                statusBadge.textContent = 'Completed';
                
                const progressFill = item.querySelector('.progress-fill');
                progressFill.style.width = '100%';
            }
            
            refreshStats();
        }

        function failQueueItem(data) {
            const item = document.getElementById(`queue-${data.fileId}`);
            if (item) {
                item.className = 'queue-item failed';
                const statusBadge = item.querySelector('.status-badge');
                statusBadge.className = 'status-badge status-failed';
                statusBadge.textContent = 'Failed';
            }
            
            refreshStats();
        }

        async function refreshStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                updateStatsDisplay(stats);
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        function updateStatsDisplay(stats) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-item">
                    <div class="stat-number">${stats.total}</div>
                    <div class="stat-label">Total Videos</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${stats.completed}</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${stats.processing}</div>
                    <div class="stat-label">Processing</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${stats.failed}</div>
                    <div class="stat-label">Failed</div>
                </div>
            `;
        }

        function clearCompleted() {
            const completedItems = document.querySelectorAll('.queue-item.completed');
            completedItems.forEach(item => item.remove());
        }

        // Initialize the dashboard
        document.addEventListener('DOMContentLoaded', function() {
            initWebSocket();
            refreshStats();
            
            // Refresh stats every 30 seconds
            setInterval(refreshStats, 30000);
        });
    </script>
</body>
</html>
