name: Video Processing & Upload to ImageKit

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Google Drive direct download link"
        required: true
        type: string

jobs:
  process-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg & tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq curl

      - name: Download video from Google Drive
        run: |
          echo "Downloading from: ${{ github.event.inputs.video_url }}"
          curl -L "${{ github.event.inputs.video_url }}" -o input_video

      - name: Analyze video
        run: |
          echo "=== VIDEO INFO ==="
          ffprobe -v quiet -print_format json -show_format -show_streams input_video | jq .

      - name: Compress & Web Optimize (H.264 / AAC)
        run: |
          ffmpeg -i input_video \
            -c:v libx264 -preset slow -crf 23 \
            -c:a aac -b:a 128k \
            -movflags +faststart \
            output_video.mp4

      - name: Check file size & split if > 98MB
        run: |
          FILE_SIZE=$(stat -c%s "output_video.mp4")
          LIMIT=$((98 * 1024 * 1024))
          if [ "$FILE_SIZE" -gt "$LIMIT" ]; then
            echo "File > 98MB, splitting..."
            ffmpeg -i output_video.mp4 -c copy -map 0 -f segment -segment_time 300 -reset_timestamps 1 part_%03d.mp4
          else
            mv output_video.mp4 part_000.mp4
          fi

      - name: Upload to ImageKit
        env:
          IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
          IMAGEKIT_URL_ENDPOINT: ${{ secrets.IMAGEKIT_URL_ENDPOINT }}
        run: |
          echo "Uploading to ImageKit..."
          for file in part_*.mp4; do
            RESPONSE=$(curl -s -X POST "https://upload.imagekit.io/api/v1/files/upload" \
              -u "${IMAGEKIT_PRIVATE_KEY}:" \
              -F "file=@${file}" \
              -F "fileName=${file}")
            URL=$(echo $RESPONSE | jq -r '.url')
            echo "✅ Uploaded $file → $URL"
            echo "$URL" >> uploaded_urls.txt
          done

      - name: Show Uploaded URLs
        run: cat uploaded_urls.txt

      - name: Upload URLs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagekit-urls
          path: uploaded_urls.txt
