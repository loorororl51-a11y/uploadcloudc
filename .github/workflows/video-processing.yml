name: Video Processing Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'videos/**'
      - 'uploads/**'
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Google Drive File ID'
        required: true
        type: string
      file_name:
        description: 'File Name'
        required: true
        type: string
  repository_dispatch:
    types: [video_upload]
  schedule:
    # Run every 10 minutes to check for new videos
    - cron: '*/10 * * * *'

env:
  NODE_VERSION: '18'

jobs:
  process-video:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup environment
      run: |
        cp env.example .env
        echo "GOOGLE_DRIVE_CLIENT_ID=${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}" >> .env
        echo "GOOGLE_DRIVE_CLIENT_SECRET=${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}" >> .env
        echo "GOOGLE_DRIVE_REFRESH_TOKEN=${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}" >> .env
        echo "GOOGLE_DRIVE_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}" >> .env
        echo "GOOGLE_SHEETS_CLIENT_ID=${{ secrets.GOOGLE_SHEETS_CLIENT_ID }}" >> .env
        echo "GOOGLE_SHEETS_CLIENT_SECRET=${{ secrets.GOOGLE_SHEETS_CLIENT_SECRET }}" >> .env
        echo "GOOGLE_SHEETS_SPREADSHEET_ID=${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}" >> .env
        echo "IMAGEKIT_PUBLIC_KEY=${{ secrets.IMAGEKIT_PUBLIC_KEY }}" >> .env
        echo "IMAGEKIT_PRIVATE_KEY=${{ secrets.IMAGEKIT_PRIVATE_KEY }}" >> .env
        echo "IMAGEKIT_URL_ENDPOINT=${{ secrets.IMAGEKIT_URL_ENDPOINT }}" >> .env
        echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env
        echo "WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}" >> .env

    - name: Process video
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          # Manual trigger with file details
          node -e "
            const { setupGoogleDrive } = require('./src/services/googleDrive');
            const { setupGoogleSheets } = require('./src/services/googleSheets');
            const { setupImageKit } = require('./src/services/imageKit');
            const { processVideoPipeline } = require('./src/processors/videoProcessor');
            
            async function initializeAndProcess() {
              try {
                // Initialize all services
                await setupGoogleDrive();
                console.log('✅ Google Drive service initialized');
                
                try {
                  await setupGoogleSheets();
                  console.log('✅ Google Sheets service initialized');
                } catch (error) {
                  console.log('⚠️ Google Sheets service failed to initialize, continuing...');
                }
                
                await setupImageKit();
                console.log('✅ ImageKit service initialized');
                
                const broadcast = (data) => console.log(JSON.stringify(data));
                
                await processVideoPipeline(
                  '${{ github.event.inputs.file_id }}',
                  '${{ github.event.inputs.file_name }}',
                  broadcast
                );
                
                console.log('Processing completed successfully');
                process.exit(0);
              } catch (error) {
                console.error('Processing failed:', error);
                process.exit(1);
              }
            }
            
            initializeAndProcess();
          "
        else
          # Automatic trigger - check for video files in commits
          node -e "
            const { setupGoogleDrive } = require('./src/services/googleDrive');
            const { setupGoogleSheets } = require('./src/services/googleSheets');
            const { setupImageKit } = require('./src/services/imageKit');
            const { getGoogleDriveService } = require('./src/services/googleDrive');
            const { processVideoPipeline } = require('./src/processors/videoProcessor');
            
            async function processNewVideos() {
              try {
                // Initialize all services first
                await setupGoogleDrive();
                console.log('✅ Google Drive service initialized');
                
                try {
                  await setupGoogleSheets();
                  console.log('✅ Google Sheets service initialized');
                } catch (error) {
                  console.log('⚠️ Google Sheets service failed to initialize, continuing...');
                }
                
                await setupImageKit();
                console.log('✅ ImageKit service initialized');
                
                const driveService = getGoogleDriveService();
                const files = await driveService.listFiles();
                
                // Filter for video files uploaded in the last hour
                const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000);
                const videoFiles = files.filter(file => {
                  const createdTime = new Date(file.createdTime);
                  return createdTime > oneHourAgo && 
                         file.mimeType && 
                         file.mimeType.startsWith('video/');
                });
                
                console.log('Found video files:', videoFiles.length);
                
                for (const file of videoFiles) {
                  try {
                    const broadcast = (data) => console.log(JSON.stringify(data));
                    await processVideoPipeline(file.id, file.name, broadcast);
                    console.log('Processed:', file.name);
                  } catch (error) {
                    console.error('Failed to process:', file.name, error);
                  }
                }
              } catch (error) {
                console.error('Error in processNewVideos:', error);
                process.exit(1);
              }
            }
            
            processNewVideos();
          "
        fi

    - name: Notify completion
      if: always()
      run: |
        echo "Video processing job completed"
        if [ "${{ job.status }}" = "success" ]; then
          echo "✅ All videos processed successfully"
        else
          echo "❌ Some videos failed to process"
        fi

  monitor-google-drive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup environment
      run: |
        cp env.example .env
        echo "GOOGLE_DRIVE_CLIENT_ID=${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}" >> .env
        echo "GOOGLE_DRIVE_CLIENT_SECRET=${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}" >> .env
        echo "GOOGLE_DRIVE_REFRESH_TOKEN=${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}" >> .env
        echo "GOOGLE_DRIVE_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}" >> .env

    - name: Check for new videos
      run: |
        node -e "
          const { setupGoogleDrive } = require('./src/services/googleDrive');
          
          async function checkForNewVideos() {
            try {
              // Initialize Google Drive service first
              await setupGoogleDrive();
              console.log('✅ Google Drive service initialized');
              
              const { getGoogleDriveService } = require('./src/services/googleDrive');
              const driveService = getGoogleDriveService();
              const files = await driveService.listFiles();
              
              // Check for video files uploaded in the last 30 minutes
              const thirtyMinutesAgo = new Date(Date.now() - 30 * 60 * 1000);
              const newVideoFiles = files.filter(file => {
                const createdTime = new Date(file.createdTime);
                return createdTime > thirtyMinutesAgo && 
                       file.mimeType && 
                       file.mimeType.startsWith('video/');
              });
              
              if (newVideoFiles.length > 0) {
                console.log('Found new video files:', newVideoFiles.length);
                for (const file of newVideoFiles) {
                  console.log('-', file.name, '(ID:', file.id, ')');
                }
                
                // Trigger processing for each file
                for (const file of newVideoFiles) {
                  const { exec } = require('child_process');
                  exec(\`gh workflow run video-processing.yml -f file_id=\${file.id} -f file_name=\${file.name}\`, (error, stdout, stderr) => {
                    if (error) {
                      console.error('Error triggering workflow:', error);
                    } else {
                      console.log('Triggered workflow for:', file.name);
                    }
                  });
                }
              } else {
                console.log('No new video files found');
              }
            } catch (error) {
              console.error('Error checking for new videos:', error);
              process.exit(1);
            }
          }
          
          checkForNewVideos();
        "

  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [process-video, monitor-google-drive]
    
    steps:
    - name: Cleanup temporary files
      run: |
        echo "Cleaning up temporary files..."
        # This would clean up any temporary files created during processing
        echo "Cleanup completed" 